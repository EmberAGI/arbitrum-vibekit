name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  merge_group:
    branches: [main, master, next]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ./typescript/pnpm-lock.yaml

      - name: Fetch PR base ref
        if: github.event_name == 'pull_request'
        working-directory: ./typescript
        run: git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Determine CI scope
        id: ci_scope
        working-directory: ./typescript
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mode=affected" >> "$GITHUB_OUTPUT"
            echo "base_ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            # merge_group checks out the synthetic queue merge commit.
            echo "mode=affected" >> "$GITHUB_OUTPUT"
            echo "base_ref=HEAD^1" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies in project
        working-directory: ./typescript
        run: pnpm install --frozen-lockfile

      - name: Run linter
        working-directory: ./typescript
        run: |
          if [ "${{ steps.ci_scope.outputs.mode }}" = "affected" ]; then
            pnpm exec tsx src/ci/run-affected-command.ts \
              --workspace-root . \
              --command lint \
              --base-ref "${{ steps.ci_scope.outputs.base_ref }}" \
              --head-ref "${{ steps.ci_scope.outputs.head_ref }}"
          else
            pnpm lint
          fi

      - name: Build project
        working-directory: ./typescript
        run: |
          if [ "${{ steps.ci_scope.outputs.mode }}" = "affected" ]; then
            pnpm exec tsx src/ci/run-affected-command.ts \
              --workspace-root . \
              --command build \
              --base-ref "${{ steps.ci_scope.outputs.base_ref }}" \
              --head-ref "${{ steps.ci_scope.outputs.head_ref }}"
          else
            pnpm run build
          fi

      - name: Initialize environment files
        working-directory: ./typescript
        run: |
          cp .env.example .env

      - name: Create agent-node test env file
        working-directory: ./typescript/lib/agent-node
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          A2A_TEST_7702_PRIVATE_KEY: ${{ secrets.A2A_TEST_7702_PRIVATE_KEY }}
          A2A_TEST_AGENT_NODE_PRIVATE_KEY: ${{ secrets.A2A_TEST_AGENT_NODE_PRIVATE_KEY }}
          A2A_TEST_CHAIN_ID: ${{ vars.A2A_TEST_CHAIN_ID }}
          A2A_TEST_7702_ADDRESS: ${{ vars.A2A_TEST_7702_ADDRESS }}
          A2A_TEST_RPC_URL: ${{ vars.A2A_TEST_RPC_URL }}
        run: |
          cat <<EOF > .env.test
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-your-openrouter-api-key-here}
          OPENAI_API_KEY=${OPENAI_API_KEY:-your-openai-api-key-here}
          XAI_API_KEY=${XAI_API_KEY:-your-xai-api-key-here}
          HYPERBOLIC_API_KEY=${HYPERBOLIC_API_KEY:-your-hyperbolic-api-key-here}

          A2A_TEST_7702_PRIVATE_KEY=${A2A_TEST_7702_PRIVATE_KEY:-0xaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
          A2A_TEST_AGENT_NODE_PRIVATE_KEY=${A2A_TEST_AGENT_NODE_PRIVATE_KEY:-0xbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb}

          A2A_TEST_CHAIN_ID=${A2A_TEST_CHAIN_ID:-42161}
          EOF

          if [ -n "${A2A_TEST_7702_ADDRESS:-}" ]; then
            echo "A2A_TEST_7702_ADDRESS=${A2A_TEST_7702_ADDRESS}" >> .env.test
          fi

          if [ -n "${A2A_TEST_RPC_URL:-}" ]; then
            echo "A2A_TEST_RPC_URL=${A2A_TEST_RPC_URL}" >> .env.test
          fi

      - name: Run tests
        working-directory: ./typescript
        run: |
          if [ "${{ steps.ci_scope.outputs.mode }}" = "affected" ]; then
            pnpm exec tsx src/ci/run-affected-command.ts \
              --workspace-root . \
              --command test:ci \
              --base-ref "${{ steps.ci_scope.outputs.base_ref }}" \
              --head-ref "${{ steps.ci_scope.outputs.head_ref }}"
          else
            pnpm run test:ci
          fi
